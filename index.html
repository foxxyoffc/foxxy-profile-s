<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Foxxy Links</title>

    <!-- FONT -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- ========================= -->
    <!-- LOADING SCREEN -->
    <!-- ========================= -->

    <div id="loader">

        <div class="loader-content">

            <div class="loader-ring"></div>

            <div class="loader-logo">

                FOXXY

            </div>

            <p>

                Loading Experience...

            </p>

        </div>

    </div>





    <!-- ========================= -->
    <!-- BACKGROUND VIDEO -->
    <!-- ========================= -->

    <video
        id="bg-video"
        autoplay
        muted
        loop
        playsinline>

        <!-- GANTI URL VIDEO -->

        <source
            src="https://YOUR-VIDEO.mp4"
            type="video/mp4">

    </video>





    <!-- Overlay Blur -->

    <div class="video-overlay"></div>





    <!-- Mouse Glow -->

    <div class="cursor-glow"></div>





    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <main>

        <!-- HEADER -->

        <header>

            <div class="profile-area">

                <!-- FOTO PROFIL -->

                <img

                    class="profile-image"

                    src="https://YOUR-PROFILE.jpg"

                    alt="Foxxy">

                <div>

                    <h2>

                        Foxxy

                    </h2>

                    <p>

                        Welcome to my links

                    </p>

                </div>

            </div>

        </header>





        <!-- CONTAINER -->

        <section class="container">





            <!-- FEATURED BUTTON -->

            <a

                href="https://wa.me/"

                class="featured-button">

                <!-- FOTO BUTTON -->

                <img

                    class="featured-image"

                    src="https://YOUR-IMAGE1.jpg"

                    alt="">



                <div class="featured-content">

                    <div class="featured-icon">

                        <i class="fab fa-whatsapp"></i>

                    </div>

                    <div>

                        <h2>

                            WhatsApp

                        </h2>

                        <p>

                            Hubungi saya langsung melalui WhatsApp.

                        </p>

                    </div>

                </div>

            </a>





            <!-- BUTTON 2 -->

            <a

                href="https://wa.me/"

                class="link-card">

                <!-- FOTO -->

                <img

                    class="thumb"

                    src="https://YOUR-IMAGE2.jpg"

                    alt="">



                <div class="icon-box">

                    <i class="fab fa-whatsapp"></i>

                </div>

                <div class="text">

                    <h3>

                        WhatsApp

                    </h3>

                    <p>

                        Fast Response

                    </p>

                </div>

                <i class="fa-solid fa-angle-right arrow"></i>

            </a>





            <!-- BUTTON 3 -->

            <a

                href="https://tiktok.com/@username"

                class="link-card">

                <img

                    class="thumb"

                    src="https://YOUR-IMAGE3.jpg"

                    alt="">



                <div class="icon-box">

                    <i class="fab fa-tiktok"></i>

                </div>

                <div class="text">

                    <h3>

                        TikTok

                    </h3>

                    <p>

                        Follow akun TikTok saya.

                    </p>

                </div>

                <i class="fa-solid fa-angle-right arrow"></i>

            </a>





            <!-- BUTTON 4 -->

            <a

                href="https://website.com"

                class="link-card">

                <img

                    class="thumb"

                    src="https://YOUR-IMAGE4.jpg"

                    alt="">



                <div class="icon-box">

                    <i class="fa-solid fa-globe"></i>

                </div>

                <div class="text">

                    <h3>

                        Website

                    </h3>

                    <p>

                        Official Website

                    </p>

                </div>

                <i class="fa-solid fa-angle-right arrow"></i>

            </a>





            <!-- BUTTON 5 -->

            <a

                href="https://website.com"

                class="link-card">

                <img

                    class="thumb"

                    src="https://YOUR-IMAGE5.jpg"

                    alt="">



                <div class="icon-box">

                    <i class="fa-solid fa-globe"></i>

                </div>

                <div class="text">

                    <h3>

                        Website

                    </h3>

                    <p>

                        Explore More

                    </p>

                </div>

                <i class="fa-solid fa-angle-right arrow"></i>

            </a>
                        <!-- ========================= -->
            <!-- END BUTTON -->
            <!-- ========================= -->

        </section>

    </main>

    <!-- ========================= -->
    <!-- FLOATING PARTICLES -->
    <!-- ========================= -->

    <div class="particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>



    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <footer>

        <p>

            Made with ❤️ by

            <span>

                foxxy

            </span>

        </p>

    </footer>



    <!-- ========================= -->
    <!-- RIPPLE EFFECT -->
    <!-- ========================= -->

    <span id="ripple"></span>



    <!-- ========================= -->
    <!-- TEMPLATE -->
    <!-- ========================= -->

    <template id="particle-template">

        <div class="particle"></div>

    </template>



    <!-- ========================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================= -->

    <script src="script.js"></script>

</body>

</html>
