<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxxy's Profile</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Font (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- CSS utama -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loader-ring">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
        <p class="loader-text">Memuat ...</p>
    </div>

    <!-- VIDEO BACKGROUND (tanpa blur) -->
    <div class="video-wrapper">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="https://files.catbox.moe/ulbx2r.mp4" type="video/mp4" />
            <!-- fallback (sama agar tetap ada) -->
            <source src="https://files.catbox.moe/ulbx2r.mp4" type="video/mp4" />
        </video>
        <!-- OVERLAY HANYA UNTUK GELAP (tanpa blur) -->
        <div class="video-overlay"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container" id="main-content">

        <!-- Profile Photo - Top Left -->
        <div class="profile-wrapper">
            <img src="https://files.catbox.moe/prffsb.png" alt="Profile" class="profile-photo" id="profile-photo" />
        </div>

        <!-- BUTTON UTAMA (BESAR) -->
        <div class="btn-glow main-glow">
            <button class="btn btn-main" id="btn-main">
                <div class="btn-image-wrap main-img-wrap">
                    <img src="https://picsum.photos/seed/main/600/400" alt="WhatsApp Main" class="btn-img main-img" />
                </div>
                <div class="btn-content main-content">
                    <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
                    <div class="btn-text">
                        <span class="btn-title">My WhatsApp</span>
                        <span class="btn-desc">Paid Edit? sung order via WhatsApp</span>
                    </div>
                </div>
            </button>
        </div>

        <!-- BUTTON 2–5 (REGULAR) -->
        <div class="buttons-grid">
            <!-- Button 2 -->
            <div class="btn-glow regular-glow">
                <button class="btn btn-regular" id="btn-2">
                    <div class="btn-image-wrap reg-img-wrap">
                        <img src="https://picsum.photos/seed/btn2/200/200" alt="WhatsApp 2" class="btn-img reg-img" />
                    </div>
                    <div class="btn-content reg-content">
                        <div class="btn-icon"><i class="fab fa-whatsapp"></i></div>
                        <div class="btn-text">
                            <span class="btn-title">Saluran WhatsApp Baru</span>
                            <span class="btn-desc">Informasi Preset</span>
                        </div>
                    </div>
                </button>
            </div>
            <!-- Button 3 -->
            <div class="btn-glow regular-glow">
                <button class="btn btn-regular" id="btn-3">
                    <div class="btn-image-wrap reg-img-wrap">
                        <img src="https://picsum.photos/seed/btn3/200/200" alt="TikTok" class="btn-img reg-img" />
                    </div>
                    <div class="btn-content reg-content">
                        <div class="btn-icon"><i class="fab fa-tiktok"></i></div>
                        <div class="btn-text">
                            <span class="btn-title">TIKTOK</span>
                            <span class="btn-desc">Ikuti saya di TikTok</span>
                        </div>
                    </div>
                </button>
            </div>
            <!-- Button 4 -->
            <div class="btn-glow regular-glow">
                <button class="btn btn-regular" id="btn-4">
                    <div class="btn-image-wrap reg-img-wrap">
                        <img src="https://picsum.photos/seed/btn4/200/200" alt="Website" class="btn-img reg-img" />
                    </div>
                    <div class="btn-content reg-content">
                        <div class="btn-icon"><i class="fas fa-globe"></i></div>
                        <div class="btn-text">
                            <span class="btn-title">WEBSITE</span>
                            <span class="btn-desc">Kunjungi website saya</span>
                        </div>
                    </div>
                </button>
            </div>
            <!-- Button 5 -->
            <div class="btn-glow regular-glow">
                <button class="btn btn-regular" id="btn-5">
                    <div class="btn-image-wrap reg-img-wrap">
                        <img src="https://picsum.photos/seed/btn5/200/200" alt="Website 2" class="btn-img reg-img" />
                    </div>
                    <div class="btn-content reg-content">
                        <div class="btn-icon"><i class="fas fa-link"></i></div>
                        <div class="btn-text">
                            <span class="btn-title">WEBSITE</span>
                            <span class="btn-desc">Portofolio saya</span>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            <p>&copy; <span id="year"></span> <span class="foxxy">foxxy</span></p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
